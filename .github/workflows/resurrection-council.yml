name: Resurrection Council

on:
  issue_comment:
    types: [created]
  schedule:
    - cron: "17 0 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: read

jobs:
  start-vote:
    if: github.event_name == 'issue_comment'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r .github/scripts/requirements.txt

      - name: Start resurrection vote
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN || github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: python .github/scripts/resurrection_council.py start

  process-votes:
    if: github.event_name != 'issue_comment'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r .github/scripts/requirements.txt

      - name: Process completed votes
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN || github.token }}
        run: python .github/scripts/resurrection_council.py process
