name: Influence Sentinel

on:
  schedule:
    - cron: "41 0 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: read
  pull-requests: read

jobs:
  update-impact-signals:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r .github/scripts/requirements.txt

      - name: Generate impact signals
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN || github.token }}
        run: python .github/scripts/influence_sentinel.py
